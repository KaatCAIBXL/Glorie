<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Marriage G&A</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #F2F1EC;
    }

    /* DEFAULT (computer & tablet) */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      cursor: pointer;
      max-width: 600px;
      width: 90%;
    }

    .card img {
      width: 100%;
      display: block;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      height: auto;
      object-fit: cover;
    }

    /* GSM: envelop fullscreen */
    @media (max-width: 768px) {
      body {
        padding: 0;
        margin: 0;
        display: block; /* geen centrering */
        height: 100vh;
      }

      .card {
        width: 100%;
        height: 100vh;
        max-width: none;
      }

      .card img {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
        object-fit: cover;
        object-position: center;
      }
    }
  </style>
</head>
<body>

  <div class="card" id="envelopeCard">
    <img src="/Invitation/2 v2.png" alt="Gesloten envelop" />
  </div>

  <script>
    document.getElementById("envelopeCard").addEventListener("click", () => {
      window.location.href = "invite.html";
    });
  </script>

</body>
</html>
