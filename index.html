<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Marriage G&A</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      max-width: 100%;
      overflow-x: hidden; /* voorkomt horizontaal scrollen */
      background: #F2F1EC;
    }

    /* De envelop vult het volledige scherm */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      cursor: pointer;
      width: 100%;
      height: 100vh; /* vult volledige hoogte */
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;      /* vult scherm zonder vervormen */
      object-position: center;
      display: block;
      border-radius: 0;       /* geen afgeronde hoeken */
      box-shadow: none;       /* geen schaduw op de envelop */
    }
  </style>
</head>
<body>

  <div class="card" id="envelopeCard">
    <img src="1.jpg" alt="Gesloten envelop" />
  </div>

  <script>
    document.getElementById("envelopeCard").addEventListener("click", () => {
      window.location.href = "invite.html";
    });
  </script>

</body>
</html>
