<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Marriage G&A</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: #F2F1EC;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      cursor: pointer;
      max-width: 600px;
      width: 90%;
    }

    .card img {
      width: 100%;
      display: block;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div class="card" id="envelopeCard">
    <img src="1.jpg" alt="Gesloten envelop" />
  </div>

  <script>
    document.getElementById("envelopeCard").addEventListener("click", () => {
      window.location.href = "invite.html";
    });
  </script>

</body>
</html>
